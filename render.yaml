services:
  - type: web
    name: aneri-ai
    env: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    pythonVersion: 3.11
    healthCheckPath: /health
